# Build and push the Vexa Lite all-in-one image (linux/amd64 + linux/arm64).
# Image: ghcr.io/<owner>/vexa-lite
#
# Requires: packages write permission (default for GITHUB_TOKEN on push to this repo).

name: Docker — Vexa Lite (multi-arch)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "docker/lite/**"
      - "services/**"
      - "libs/shared-models/**"
      - "alembic.ini"
      - ".github/workflows/docker-vexa-lite.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        id: image
        run: |
          owner_lc=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "name=${REGISTRY}/${owner_lc}/vexa-lite" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/lite/Dockerfile.lite
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
